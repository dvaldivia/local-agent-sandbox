name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the changelog
      - uses: actions/setup-go@v5
        with: { go-version: "1.26.x" }
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Publishes the GitHub Release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to dvaldivia/homebrew-tap (repo scope).
          # Add it as a repo secret named HOMEBREW_TAP_GITHUB_TOKEN.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
